name: Сборка Удалёнки

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:

  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++ gcc git curl wget nasm yasm \
            libgtk-3-dev clang libxcb-randr0-dev libxdo-dev \
            libxfixes-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libasound2-dev libpulse-dev cmake make \
            libpam0g-dev libappindicator3-dev \
            libunwind-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            pkg-config ninja-build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: linux-x64

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        run: |
          $VCPKG_ROOT/vcpkg install \
            --triplet x64-linux \
            --x-install-root="$VCPKG_ROOT/installed"
        shell: bash

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Build
        run: python3 ./build.py --flutter --hwcodec

      - name: Package
        run: |
          mkdir -p release
          if [ -d "flutter/build/linux/x64/release/bundle" ]; then
            cp -r flutter/build/linux/x64/release/bundle release/udalenka-linux-x64
          elif [ -f "target/release/udalenka" ]; then
            mkdir -p release/udalenka-linux-x64
            cp target/release/udalenka release/udalenka-linux-x64/
          fi
          cd release && tar czf udalenka-linux-x64.tar.gz udalenka-linux-x64/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: udalenka-linux-x64
          path: |
            release/udalenka-linux-x64.tar.gz
            flutter/build/linux/x64/release/bundle/

  build-windows:
    name: Windows x86_64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-x64

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        run: |
          $VCPKG_ROOT/vcpkg install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"
        shell: bash

      - name: Setup LLVM
        run: |
          # Use pre-installed LLVM or install via choco
          if (Test-Path "C:\Program Files\LLVM\bin\clang.exe") {
            echo "LLVM already installed"
            & "C:\Program Files\LLVM\bin\clang.exe" --version
          } else {
            choco install -y llvm
          }
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install NASM
        run: |
          choco install -y nasm
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Build
        run: python3 .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack

      - name: Package
        run: |
          mkdir release
          if (Test-Path flutter\build\windows\x64\runner\Release) {
            Copy-Item -Recurse flutter\build\windows\x64\runner\Release release\udalenka-windows-x64
          } elseif (Test-Path target\release\udalenka.exe) {
            mkdir release\udalenka-windows-x64
            Copy-Item target\release\udalenka.exe release\udalenka-windows-x64\
          }
          Compress-Archive -Path release\udalenka-windows-x64 -DestinationPath release\udalenka-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: udalenka-windows-x64
          path: release/udalenka-windows-x64.zip

  release:
    name: Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Удалёнка ${{ github.ref_name }}"
          body: |
            ## Удалёнка ${{ github.ref_name }}
            
            Бесплатный удалённый доступ к рабочему столу.
            
            ### Скачать:
            - **Windows:** `udalenka-windows-x64.zip`
            - **Linux:** `udalenka-linux-x64.tar.gz`
            
            ### Настройка:
            Сервер уже встроен в клиент. Просто установите и используйте!
          files: |
            udalenka-linux-x64/udalenka-linux-x64.tar.gz
            udalenka-windows-x64/udalenka-windows-x64.zip
